<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardben 的科技空间</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 防止出现滚动条 */
            background-color: #000; /* 科技感深色背景 */
        }
        
        /* 让 3D 模型撑满全屏 */
        spline-viewer {
            width: 100vw;
            height: 100vh;
        }

        /* 浮动在 3D 模型之上的文字 */
        .content {
            position: absolute;
            top: 50%;
            left: 10%;
            transform: translateY(-50%);
            color: #00d4ff; /* 霓虹蓝 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
            pointer-events: none; /* 让鼠标穿透文字去操作 3D 模型 */
        }
    </style>
</head>
<body>

    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.69/build/spline-viewer.js"></script>
    <spline-viewer url="https://prod.spline.design/AIZkBf13oHFx-STS/scene.splinecode"></spline-viewer>

    
    <div class="content">
        <h1>HARDBEN</h1>
        <p>探索科技与未来的边界</p>
    </div>

</body>
</html>
